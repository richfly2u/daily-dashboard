services:
  - type: web
    name: daily-dashboard-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATA_FILE
        value: /var/data/dashboard.json
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
