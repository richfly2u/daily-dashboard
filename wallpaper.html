<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌面儀表板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0e;
    color: #e8e8ed;
    width: 100vw; height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  .wp-grid { background: transparent; }

  /* === 整頁滾動：兩列待辦節省垂直空間 === */
  .wp-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px 12px 20px;
    width: 540px;
    height: 100vh;
    margin-left: auto;
    margin-right: 0;
    overflow-y: auto;
  }
  .wp-grid::-webkit-scrollbar { width: 4px; }
  .wp-grid::-webkit-scrollbar-track { background: transparent; }
  .wp-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* === 毛玻璃卡片 === */
  .widget {
    background: rgba(15, 15, 19, 0.55);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  .widget-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 10px;
  }

  /* === Header === */
  .wp-header {
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
    padding: 10px 16px;
    background: rgba(15, 15, 19, 0.55);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
  }
  .wp-header .board-title { font-size: 15px; font-weight: 700; }
  .wp-header .date-nav { display: flex; align-items: center; gap: 8px; }
  .wp-header .date-nav button {
    background: rgba(255,255,255,0.08);
    border: none; color: #ccc;
    width: 28px; height: 28px;
    border-radius: 8px;
    cursor: pointer; font-size: 16px;
    transition: background .2s;
  }
  .wp-header .date-nav button:hover { background: rgba(255,255,255,0.15); }
  .wp-header .date-label { font-size: 13px; font-weight: 600; min-width: 90px; text-align: center; }
  .wp-header .date-label .wk { color: rgba(255,255,255,0.4); font-weight: 400; }

  /* === 統計橫條 === */
  .wp-stats {
    display: flex; gap: 8px; flex-shrink: 0;
    background: rgba(15, 15, 19, 0.55);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 10px 14px;
  }
  .stat-card { flex: 1; text-align: center; }
  .stat-card + .stat-card { border-left: 1px solid rgba(255,255,255,0.05); padding-left: 8px; }
  .stat-label { font-size: 9px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .stat-value { font-size: 18px; font-weight: 700; }
  .stat-value.green { color: #34d399; }
  .stat-value.blue { color: #60a5fa; }
  .stat-value.purple { color: #a78bfa; }

  .progress-widget {
    display: flex; align-items: center; gap: 8px; width: 100%; margin-top: 4px;
  }
  .progress-widget .progress-bar {
    flex: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
  }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #6c5ce7, #a855f7); border-radius: 2px; transition: width .5s ease; }
  .progress-widget .pct-label { font-size: 10px; color: rgba(255,255,255,0.3); white-space: nowrap; }

  .streak-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; color: white;
  }

  /* === 主體兩欄：左邊待辦 + 右邊關心＆熱力 === */
  .wp-main {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 8px;
  }
  .wp-tasks {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    background: rgba(15, 15, 19, 0.55);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .wp-tasks .widget-title { margin-bottom: 8px; flex-shrink: 0; }
  .task-list {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    margin: 0 -14px;
    padding: 0 14px;
  }
  .task-list::-webkit-scrollbar { width: 3px; }
  .task-list::-webkit-scrollbar-track { background: transparent; }
  .task-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
  .add-row { flex-shrink: 0; }
  .wp-right {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: background .15s;
  }
  .task-item:hover { background: rgba(255,255,255,0.04); }
  .task-item.done { opacity: 0.55; }
  .task-item.done .task-text { text-decoration: line-through; color: rgba(255,255,255,0.3); }

  .task-cb {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: transparent;
    transition: all .2s;
  }
  .task-item.done .task-cb {
    border-color: #34d399; background: #34d399; color: #0f0f13;
  }
  .task-num { color: rgba(255,255,255,0.2); font-size: 11px; font-weight: 600; width: 18px; text-align: center; flex-shrink: 0; }
  .task-text { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; }
  .task-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: linear-gradient(135deg, #6c5ce7, #a855f7);
    color: white; font-weight: 600; flex-shrink: 0;
  }
  .task-item.done .task-tag { opacity: 0.4; }

  .add-row {
    display: flex; gap: 8px; margin-top: 8px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .add-row input {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 12px;
    color: #e8e8ed; font-size: 13px; outline: none;
  }
  .add-row input:focus { border-color: rgba(168,85,247,0.4); }
  .add-row input::placeholder { color: rgba(255,255,255,0.2); }
  .add-row .add-btn {
    background: linear-gradient(135deg, #6c5ce7, #a855f7);
    border: none; color: white;
    width: 36px; border-radius: 10px;
    cursor: pointer; font-size: 18px; font-weight: 600; flex-shrink: 0;
  }

  /* === 底部：關心 + 熱力圖 === */
  .wp-bottom {
    display: flex; gap: 8px;
  }
  .wp-care {
    flex: 1;
    background: rgba(15, 15, 19, 0.55);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .wp-care .widget-title {
    margin-bottom: 6px;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .wp-care .widget-title:hover { color: rgba(255,255,255,0.5); }
  .wp-care .care-arrow { font-size: 8px; transition: transform .25s; }
  .wp-care .care-arrow.open { transform: rotate(90deg); }
  .wp-care.collapsed #careList { display: none; }
  .wp-care.collapsed .widget-title { margin-bottom: 0; }
  .care-person {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 6px; border-radius: 8px;
    font-size: 11px;
  }
  .care-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(135deg, #6c5ce7, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .care-name { flex: 1; font-weight: 500; font-size: 11px; }
  .care-status { font-size: 9px; padding: 1px 6px; border-radius: 6px; font-weight: 600; flex-shrink: 0; }
  .care-status.ready { background: rgba(52,211,153,0.15); color: #34d399; }
  .care-status.cooling { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .care-status.never { background: rgba(96,165,250,0.15); color: #60a5fa; }

  .wp-heatmap {
    flex: 1;
    background: rgba(15, 15, 19, 0.55);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .heatmap-row { display: flex; gap: 2px; align-items: flex-end; height: 24px; }
  .h-day {
    width: 12px; border-radius: 2px;
    background: rgba(255,255,255,0.04);
    transition: background .2s;
  }
  .h-day.l1 { background: rgba(168,85,247,0.15); }
  .h-day.l2 { background: rgba(168,85,247,0.3); }
  .h-day.l3 { background: rgba(168,85,247,0.5); }
  .h-day.l4 { background: rgba(168,85,247,0.7); }
  .h-day.l5 { background: #34d399; }
  .h-day.today { outline: 1px solid rgba(168,85,247,0.6); outline-offset: 1px; }
  .heatmap-legend {
    display: flex; justify-content: flex-end; align-items: center; gap: 3px;
    margin-top: 4px; font-size: 9px; color: rgba(255,255,255,0.2);
  }
  .h-swatch { width: 8px; height: 8px; border-radius: 1px; }

  /* === 按鈕 === */
  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    background: rgba(255,255,255,0.06);
    border: none; color: rgba(255,255,255,0.5);
    font-size: 14px; padding: 6px 12px; border-radius: 10px;
    cursor: pointer; transition: all .2s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.1); color: #e8e8ed; }

  /* === 登入畫面 === */
  .login-screen {
    display: flex; align-items: center; justify-content: center;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
  }
  .login-card {
    background: rgba(15,15,19,0.6);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
  }
  .login-card h2 { font-size: 22px; margin-bottom: 8px; }
  .login-card p { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 20px; }
  .login-card input {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 12px 18px;
    color: #e8e8ed; font-size: 16px; text-align: center;
    outline: none; width: 200px;
  }
  .login-card input:focus { border-color: rgba(168,85,247,0.5); }
  .login-card button {
    background: linear-gradient(135deg, #6c5ce7, #a855f7);
    border: none; color: white;
    padding: 10px 36px; border-radius: 12px;
    font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px;
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div style="font-size:40px;margin-bottom:12px;">📋</div>
    <h2>桌面儀表板</h2>
    <p>輸入儀表板名稱</p>
    <input type="text" id="loginKey" placeholder="alan" maxlength="20">
    <br>
    <button id="loginBtn">進入</button>
  </div>
</div>

<div id="mainApp" style="display:none;width:100%;height:100%;">
  <div class="wp-grid">

    <!-- Header -->
    <div class="wp-header">
      <div class="board-title">📋 <span id="boardName">儀表板</span></div>
      <div class="date-nav">
        <button id="prevDay">‹</button>
        <span class="date-label"><span id="dateLabel">—</span> <span class="wk" id="weekdayLabel"></span></span>
        <button id="nextDay">›</button>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="todayBtn" style="display:none">📅 今天</button>
        <button class="header-btn" id="resetBtn">🗑️</button>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="wp-stats">
      <div class="stat-card"><div class="stat-label">已完成</div><div class="stat-value blue" id="doneCount">0</div></div>
      <div class="stat-card"><div class="stat-label">總項目</div><div class="stat-value green" id="totalCount">10</div></div>
      <div class="stat-card"><div class="stat-label">完成率</div><div class="stat-value purple" id="rateCount">0%</div></div>
      <div class="stat-card" style="border-left:1px solid rgba(255,255,255,0.05);padding-left:8px;">
        <div style="display:flex;align-items:center;gap:4px;">
          <div class="progress-widget" style="flex:1;">
            <div class="progress-bar" style="flex:1;"><div class="progress-fill" id="progressFill"></div></div>
            <span class="pct-label" id="progressPct">0%</span>
          </div>
          <span class="streak-badge" id="streakBadge" style="display:none;">🔥 <span id="streakCount">0</span>天</span>
        </div>
      </div>
    </div>

    <!-- 主體兩欄：左待辦 ＋ 右關心熱力 -->
    <div class="wp-main">
      <!-- Left: Task List -->
      <div class="wp-tasks">
        <div class="widget-title">待辦事項</div>
        <div class="task-list" id="taskList"></div>
        <div class="add-row">
          <input type="text" id="newItemInput" placeholder="新增事項..." maxlength="60">
          <button class="add-btn" id="addBtn">+</button>
        </div>
      </div>
      <!-- Right: Care + Heatmap -->
      <div class="wp-right">
        <div class="wp-care" id="careWidget">
          <div class="widget-title" id="careTitle"><span class="care-arrow" id="careArrow">▶</span>關心總覽</div>
          <div id="careList"></div>
        </div>
        <div class="wp-heatmap">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="font-size:9px;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:0.5px;">近 90 天</span>
          </div>
          <div class="heatmap-row" id="heatmap"></div>
          <div class="heatmap-legend">
            <span>少</span>
            <span class="h-swatch" style="background:rgba(255,255,255,0.04)"></span>
            <span class="h-swatch" style="background:rgba(168,85,247,0.15)"></span>
            <span class="h-swatch" style="background:rgba(168,85,247,0.3)"></span>
            <span class="h-swatch" style="background:rgba(168,85,247,0.5)"></span>
            <span class="h-swatch" style="background:rgba(168,85,247,0.7)"></span>
            <span class="h-swatch" style="background:#34d399"></span>
            <span>多</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCRazQsleeT4H4Nt6VrqI1KGlfVenc",
  authDomain: "bentodish-alan.firebaseapp.com",
  projectId: "bentodish-alan",
  storageBucket: "bentodish-alan.firebasestorage.app",
  messagingSenderId: "652937239500",
  appId: "1:652937239500:web:2c4c3b28b2311f2b12db69"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const DEFAULTS = [
  {text:"早起後不碰手機，先喝水",type:"text",locked:true},
  {text:"每天讀 10 頁紙本書",type:"text",locked:true},
  {text:"寫三句話日記",type:"text",locked:true},
  {text:"整理一個空間（10分鐘）",type:"text",locked:true},
  {text:"做 10 分鐘運動",type:"text",locked:true},
  {text:"學一個小技能",type:"text",locked:true},
  {text:"和一個人深度聊天",type:"text",locked:true},
  {text:"今日關心成全了誰？",type:"name-picker",selected:"",locked:true},
  {text:"睡前寫下明天要做的事",type:"text",locked:true},
  {text:"今天成全了誰？",type:"name-picker",selected:"",locked:true}
];

let boardKey = localStorage.getItem('dashboard_key') || '';
let cache = {};
let currentDate = new Date();
let nameList = [];
let saveTimer = null;
let careDates = {};
let careEvery = 1, careCount = 1, careInterval = 7;
const EPOCH = new Date('2025-01-01');
const DAY_NAMES = ['日','一','二','三','四','五','六'];

function getDateDiffDays() {
  const ref = new Date(EPOCH);
  const now = new Date();
  return Math.round((now - ref) / 86400000);
}
function getCareSuggestions() {
  if (!nameList.length || careEvery < 1) return [];
  const diff = getDateDiffDays();
  const isCareDay = (diff % careEvery) === 0;
  if (!isCareDay) return [];
  const now = new Date();
  const eligible = nameList.filter(n => {
    const last = careDates[n];
    if (!last) return true;
    const lastD = new Date(last);
    return Math.round((now - lastD) / 86400000) >= careInterval;
  });
  const scored = eligible.map(n => ({ name: n, score: careDates[n] ? -Math.round((now - new Date(careDates[n])) / 86400000) : -999 }));
  scored.sort((a, b) => a.score - b.score);
  return scored.map(s => s.name);
}
function getTodayPerson() {
  const suggestions = getCareSuggestions();
  if (suggestions.length) return suggestions[0];
  if (!nameList.length) return '';
  const start = new Date('2024-01-01');
  const diff = Math.floor((Date.now() - start.getTime()) / 86400000);
  return nameList[diff % nameList.length];
}
function cycleName(current) {
  if (!nameList.length) return '';
  const idx = nameList.indexOf(current);
  return nameList[(idx + 1) % nameList.length];
}
function dk(d) { return d.toISOString().slice(0,10); }
function today() { return dk(new Date()); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadDoc() {
  try {
    const snap = await db.collection("dashboard").doc(boardKey).get();
    return snap.exists ? snap.data() : {};
  } catch(e) { return {}; }
}

async function loadDay(key, dateStr) {
  const data = await loadDoc();
  nameList = data._names && data._names.length ? data._names : [];
  careEvery = data._careEvery || 1;
  careCount = data._careCount || 1;
  careInterval = data._careInterval || 7;
  careDates = data._careDates || {};
  const dayData = data[dateStr];
  if (dayData && dayData.items) {
    cache[dateStr] = { items: dayData.items.map(i => typeof i === 'string'
      ? {text:i,type:"text",done:false,selected:"",notes:"",locked:true}
      : {...i, done:i.done||false, selected:i.selected||"", locked:i.locked!==false}) };
  } else {
    cache[dateStr] = { items: DEFAULTS.map(i => ({...i, done:false, selected:i.selected||""})) };
  }
  render();
}

async function saveCurrentDay() {
  const day = cache[dk(currentDate)];
  if (!day) return;
  const data = await loadDoc();
  data[dk(currentDate)] = { items: day.items.map(i => ({text:i.text,type:i.type,done:i.done,selected:i.selected||"",locked:i.locked!==false})) };
  data._names = nameList;
  data._careEvery = careEvery; data._careCount = careCount;
  data._careInterval = careInterval; data._careDates = careDates;
  try { await db.collection("dashboard").doc(boardKey).set(data); } catch(e) {}
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentDay, 500);
}

function render() {
  const key = dk(currentDate);
  const day = cache[key];
  if (!day) return;
  const items = day.items;
  const total = items.length, completed = items.filter(i => i.done).length;
  const rate = total ? Math.round(completed/total*100) : 0;

  document.getElementById('dateLabel').textContent = `${currentDate.getFullYear()}/${currentDate.getMonth()+1}/${currentDate.getDate()}`;
  document.getElementById('weekdayLabel').textContent = `週${DAY_NAMES[currentDate.getDay()]}`;
  document.getElementById('todayBtn').style.display = dk(currentDate) === today() ? 'none' : '';
  document.getElementById('doneCount').textContent = completed;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('rateCount').textContent = rate + '%';
  document.getElementById('progressPct').textContent = rate + '%';
  document.getElementById('progressFill').style.width = rate + '%';

  // Task list
  const list = document.getElementById('taskList');
  list.innerHTML = items.map((item, i) => {
    const isNp = item.type === 'name-picker';
    // Auto-select name for empty name-picker items
    if (isNp && !item.selected && nameList.length) {
      item.selected = getTodayPerson();
      if (item.selected) scheduleSave();
    }
    const name = isNp ? (item.selected || '?') : '';
    return `<div class="task-item${item.done?' done':''}" data-idx="${i}">
      <span class="task-num">${i+1}</span>
      <div class="task-cb">✓</div>
      <span class="task-text">${esc(isNp ? item.text : item.text)}</span>
      ${name ? `<span class="task-tag" data-np="${i}">👤 ${esc(name)}</span>` : ''}
    </div>`;
  }).join('');

  list.querySelectorAll('.task-item').forEach(el => {
    el.onclick = (e) => {
      const i = parseInt(el.dataset.idx);
      const d = cache[dk(currentDate)];
      if (!d || !d.items[i]) return;
      // If clicking the tag on a name-picker, cycle name instead of toggle
      if (d.items[i].type === 'name-picker' && e.target.classList.contains('task-tag')) {
        const newName = cycleName(d.items[i].selected || '');
        if (newName) {
          d.items[i].selected = newName;
          // Record care date
          careDates[newName] = dk(new Date());
          render();
          scheduleSave();
        }
        return;
      }
      d.items[i].done = !d.items[i].done;
      // Record care date when marking name-picker as done
      if (d.items[i].done && d.items[i].type === 'name-picker' && d.items[i].selected) {
        d.items[i].selected.split(',').filter(Boolean).forEach(s => { careDates[s] = dk(new Date()); });
      }
      render();
      scheduleSave();
    };
  });

  // Heatmap
  renderHeatmap();
  renderStreak();
  renderCare();
}

function renderHeatmap() {
  const c = document.getElementById('heatmap');
  c.innerHTML = '';
  const t = new Date();
  for (let i = 89; i >= 0; i--) {
    const d = new Date(t); d.setDate(d.getDate() - i);
    const ds = dk(d);
    const day = cache[ds];
    let level = 0;
    if (day && day.items.length) {
      const r = day.items.filter(x => x.done).length / day.items.length;
      if (r === 1) level = 5;
      else if (r >= 0.8) level = 4;
      else if (r >= 0.6) level = 3;
      else if (r >= 0.3) level = 2;
      else if (r > 0) level = 1;
    }
    const div = document.createElement('div');
    div.className = `h-day l${level}${ds === today() ? ' today' : ''}`;
    div.title = `${d.getMonth()+1}/${d.getDate()}`;
    c.appendChild(div);
  }
}

function renderStreak() {
  let s = 0; const d = new Date();
  while (true) {
    const ds = dk(d); const day = cache[ds];
    if (!day) break;
    if (day.items.length && day.items.every(i => i.done)) { s++; d.setDate(d.getDate() - 1); }
    else break;
  }
  const badge = document.getElementById('streakBadge');
  if (s > 0) { badge.style.display = 'inline-flex'; document.getElementById('streakCount').textContent = s; }
  else badge.style.display = 'none';
}

function renderCare() {
  const c = document.getElementById('careList');
  c.innerHTML = '';
  if (!nameList.length) { c.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:11px;">無人員名單</div>'; return; }
  const now = new Date();
  const sorted = [...nameList].map(n => {
    const last = careDates[n];
    const days = last ? Math.round((now - new Date(last)) / 86400000) : -1;
    const eligible = days === -1 || days >= careInterval;
    return { n, days, eligible, status: days === -1 ? 'never' : (eligible ? 'ready' : 'cooling'),
      label: days === -1 ? '未曾' : (eligible ? `✓ 可關心` : `${days}/${careInterval}天`) };
  }).sort((a, b) => {
    if (a.days === -1 && b.days === -1) return nameList.indexOf(a.n) - nameList.indexOf(b.n);
    if (a.days === -1) return -1; if (b.days === -1) return 1;
    return a.days - b.days;
  });
  c.innerHTML = sorted.map(p => `
    <div class="care-person">
      <div class="care-avatar">${esc(p.n.charAt(0))}</div>
      <span class="care-name">${esc(p.n)}</span>
      <span class="care-status ${p.status}">${esc(p.label)}</span>
    </div>`).join('');
}

// === Care Toggle ===
function toggleCare() {
  const w = document.getElementById('careWidget');
  const a = document.getElementById('careArrow');
  const open = w.classList.toggle('collapsed');
  a.classList.toggle('open', !open);
  localStorage.setItem('careCollapsed', open);
}
function initCareToggle() {
  const collapsed = localStorage.getItem('careCollapsed') === 'true';
  const w = document.getElementById('careWidget');
  const a = document.getElementById('careArrow');
  if (collapsed) { w.classList.add('collapsed'); a.classList.remove('open'); }
  else { a.classList.add('open'); }
  document.getElementById('careTitle').onclick = toggleCare;
}

// === Realtime Sync ===
let syncUnsub = null;
function startRealtimeSync() {
  if (syncUnsub) syncUnsub();
  const ref = db.collection("dashboard").doc(boardKey);
  let ready = false;
  setTimeout(() => { ready = true; }, 3000);
  syncUnsub = ref.onSnapshot({ includeMetadataChanges: true }, snap => {
    if (!snap.exists || !ready) return;
    if (snap.metadata.hasPendingWrites) return;
    const data = snap.data();
    if (!data) return;
    nameList = data._names && data._names.length ? data._names : [];
    careEvery = data._careEvery || 1; careCount = data._careCount || 1;
    careInterval = data._careInterval || 7; careDates = data._careDates || {};
    const oldCache = cache;
    cache = {};
    for (const [ds, dd] of Object.entries(data)) {
      if (ds.startsWith('_')) continue;
      if (dd && dd.items) cache[ds] = { items: dd.items.map(i => typeof i === 'string'
        ? {text:i,type:"text",done:false,selected:"",locked:true}
        : {...i, done:i.done||false, selected:i.selected||"", locked:i.locked!==false}) };
    }
    const d2 = new Date();
    for (let i = 0; i < 90; i++) {
      const d3 = new Date(d2); d3.setDate(d3.getDate()-i);
      const ds = dk(d3);
      if (!cache[ds]) cache[ds] = { items: DEFAULTS.map(x => ({...x, done:false, selected:x.selected||""})) };
    }
    render();
  }, err => { console.warn('Sync error:', err); });
}

document.getElementById('loginBtn').onclick = () => doLogin();
document.getElementById('loginKey').onkeydown = e => { if (e.key === 'Enter') doLogin(); };
async function doLogin() {
  const key = document.getElementById('loginKey').value.trim().toLowerCase();
  if (!key) return;
  boardKey = key;
  localStorage.setItem('dashboard_key', boardKey);
  document.getElementById('boardName').textContent = key + ' 的儀表板';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  await loadDay(boardKey, dk(currentDate));
  // Preload 90 days
  const data = await loadDoc();
  nameList = data._names && data._names.length ? data._names : [];
  careEvery = data._careEvery || 1; careCount = data._careCount || 1;
  careInterval = data._careInterval || 7; careDates = data._careDates || {};
  for (const [ds, dd] of Object.entries(data)) {
    if (ds === '_names' || ds === '_careEvery' || ds === '_careCount' || ds === '_careInterval' || ds === '_careDates') continue;
    if (ds === dk(currentDate)) continue;
    if (dd && dd.items) cache[ds] = { items: dd.items.map(i => typeof i === 'string'
      ? {text:i,type:"text",done:false,selected:"",locked:true}
      : {...i, done:i.done||false, selected:i.selected||"", locked:i.locked!==false}) };
  }
  const t = new Date();
  for (let i = 0; i < 90; i++) { const d2 = new Date(t); d2.setDate(d2.getDate() - i); const ds = dk(d2); if (!cache[ds]) cache[ds] = { items: DEFAULTS.map(x => ({...x, done:false, selected:x.selected||""})) }; }
  render();
  startRealtimeSync();
}

document.getElementById('prevDay').onclick = () => { currentDate.setDate(currentDate.getDate()-1); const ds=dk(currentDate); if(!cache[ds]) cache[ds]={items:DEFAULTS.map(i=>({...i,done:false,selected:i.selected||""}))}; render(); };
document.getElementById('nextDay').onclick = () => { currentDate.setDate(currentDate.getDate()+1); const ds=dk(currentDate); if(!cache[ds]) cache[ds]={items:DEFAULTS.map(i=>({...i,done:false,selected:i.selected||""}))}; render(); };
document.getElementById('todayBtn').onclick = () => { currentDate=new Date(); render(); };
document.getElementById('addBtn').onclick = () => { const i=document.getElementById('newItemInput'); const t=i.value.trim(); if(!t) return; const d=cache[dk(currentDate)]; if(d) { d.items.push({text:t,type:"text",done:false,selected:"",locked:false}); render(); scheduleSave(); } i.value=''; };
document.getElementById('newItemInput').onkeydown = e => { if (e.key==='Enter') document.getElementById('addBtn').click(); };
document.getElementById('resetBtn').onclick = () => {
  if (!confirm('重置今天資料？')) return;
  const ds=dk(currentDate); cache[ds]={items:DEFAULTS.map(i=>({...i,done:false,selected:i.selected||""}))}; render();
  if (boardKey) saveCurrentDay();
};
