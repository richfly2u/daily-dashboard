<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="行動儀表板">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192-android.png">
<title>每日行動儀表板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: linear-gradient(160deg, #0a0a1a 0%, #12102a 20%, #1a0a30 40%, #162040 60%, #0f1a3a 80%, #0a0a1a 100%); color: #e8e8ed; min-height: 100vh; position: relative; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: -20%; left: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse at center, rgba(108,92,231,0.08) 0%, rgba(168,85,247,0.04) 30%, transparent 70%); pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; bottom: -10%; right: -10%; width: 50%; height: 50%; background: radial-gradient(ellipse at center, rgba(96,165,250,0.06) 0%, rgba(147,197,253,0.03) 30%, transparent 70%); pointer-events: none; z-index: 0; }
  .app { max-width: 720px; margin: 0 auto; padding: 24px 16px 40px; position: relative; z-index: 1; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-dot.online { background: #34d399; }
  .status-dot.offline { background: #f59e0b; }

  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 20px; position: relative; z-index: 1; }
  .login-screen h2 { font-size: 24px; margin-bottom: 8px; }
  .login-screen p { color: #888; font-size: 14px; margin-bottom: 24px; }
  .login-screen input { background: rgba(255,255,255,0.10); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.30); border-radius: 12px; padding: 14px 18px; color: #e8e8ed; font-size: 18px; text-align: center; outline: none; width: 200px; }
  .login-screen input:focus { border-color: #6c5ce7; }
  .login-screen .login-btn { background: linear-gradient(135deg, #6c5ce7, #a855f7); border: none; color: white; padding: 12px 40px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
  .login-screen .hint { color: #555; font-size: 12px; margin-top: 16px; }

  .streak-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 6px 14px; border-radius: 30px; font-size: 13px; font-weight: 700; color: white; margin-bottom: 20px; }
  .date-nav { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.10); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.30); border-radius: 14px; padding: 12px 16px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.25); }
  .date-nav .date-label { font-size: 16px; font-weight: 600; }
  .date-nav .date-label .weekday { color: #888; font-weight: 400; font-size: 13px; margin-left: 6px; }
  .date-nav button { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
  .date-nav .today-btn { font-size: 12px; color: #6c5ce7; font-weight: 600; cursor: pointer; padding: 4px 10px; border-radius: 8px; }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; position: relative; }
  .stats::before { content: ''; position: absolute; top: 10px; left: 10px; right: 10px; height: 60px; background: radial-gradient(ellipse at center, rgba(108,92,231,0.12) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .stat-card { background: rgba(255,255,255,0.10); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.30); border-radius: 16px; padding: 16px 10px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.25); z-index: 1; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat-card.c1::before { background: linear-gradient(90deg, rgba(52,211,153,0.6), rgba(110,231,183,0.3)); }
  .stat-card.c2::before { background: linear-gradient(90deg, rgba(96,165,250,0.6), rgba(147,197,253,0.3)); }
  .stat-card.c3::before { background: linear-gradient(90deg, rgba(245,158,11,0.6), rgba(251,191,36,0.3)); }
  .stat-card .num { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
  .stat-card .label { font-size: 11px; color: #aaa; margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .stat-card .num.green { color: #34d399; }
  .stat-card .num.blue { color: #60a5fa; }
  .stat-card .num.amber { color: #fbbf24; }

  .progress-wrap { background: rgba(255,255,255,0.10); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.30); border-radius: 14px; padding: 16px; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.25); }
  .progress-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
  .progress-top .pct { font-weight: 700; color: #6c5ce7; }
  .progress-bar { height: 6px; background: #282838; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #6c5ce7, #a855f7); border-radius: 3px; transition: width .5s ease; }

  .checklist-wrap { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
  .checklist-wrap .edit-bar { display: flex; align-items: flex-start; padding-top: 4px; flex-shrink: 0; }
  .checklist-wrap .edit-bar .edit-toggle { background: #1e1e28; border: 1px solid #333; color: #888; font-size: 10px; padding: 10px 6px; border-radius: 50px; cursor: pointer; transition: all .3s ease; box-shadow: 0 2px 8px rgba(0,0,0,.4); writing-mode: vertical-rl; letter-spacing: 4px; animation: editSlideIn .8s ease-out backwards; }
  .checklist-wrap .edit-bar .edit-toggle:hover { border-color: #fbbf24; color: #fbbf24; transform: scale(1.08); }
  .checklist-wrap .edit-bar .edit-toggle.active { background: #fbbf24; border-color: #fbbf24; color: #0f0f13; font-weight: 700; }
  .checklist { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 0; }
  .check-item { background: rgba(255,255,255,0.10); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.30); border-radius: 12px; padding: 0 12px 0 6px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; cursor: pointer; transition: all .2s; box-shadow: 0 4px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.20); }
  .check-item:hover { border-color: rgba(255,255,255,0.12); }
  .check-item.done { opacity: 0.7; }
  .check-item.done .item-text { text-decoration: line-through; color: #666; }
  .check-item .cb { width: 22px; height: 22px; border: 2px solid #444; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; }
  .check-item.done .cb { border-color: #34d399; background: #34d399; color: #0f0f13; }
  .check-item .item-text { flex: 1; padding: 12px 0; font-size: 14px; }
  .check-item .lock-btn { background: none; border: none; font-size: 13px; cursor: pointer; padding: 4px 2px; border-radius: 4px; opacity: 0.5; flex-shrink: 0; }
  .check-item:hover .lock-btn { opacity: 1; }
  .check-item .edit-btn { background: none; border: none; font-size: 13px; cursor: pointer; padding: 4px 2px; border-radius: 4px; flex-shrink: 0; margin-right: 2px; }
  .check-item .item-text-input { flex:1; background:#0f0f13; border:1px solid #6c5ce7; border-radius:6px; padding:6px 10px; color:#e8e8ed; font-size:14px; font-family:inherit; outline:none; min-width:0; }
  .check-item .note-btn { background: none; border: none; color: #555; font-size: 13px; cursor: pointer; padding: 4px 2px; border-radius: 4px; opacity: 0.4; flex-shrink: 0; }
  .check-item:hover .note-btn, .check-item.has-note .note-btn { opacity: 1; }
  .check-item.has-note .note-btn { color: #a78bfa; }
  .check-item .del-btn { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; padding: 4px; border-radius: 4px; opacity: 0; }
  .check-item:hover .del-btn { opacity: 1; }
  .check-item .item-num { color: #555; font-size: 12px; font-weight: 600; width: 20px; text-align: center; flex-shrink: 0; }
  .note-area { display: none; width: 100%; padding: 4px 4px 10px; flex-shrink: 0; position: relative; }
  .note-area.open { display: block; }
  .note-area textarea { width: 100%; background: #0f0f13; border: 1px solid #282838; border-radius: 8px; padding: 10px 12px; color: #aaa; font-size: 13px; font-family: inherit; outline: none; resize: vertical; min-height: 80px; }
  .note-area textarea:focus { border-color: #6c5ce7; color: #e8e8ed; }
  .note-close-btn { position: absolute; top: 6px; right: 6px; background: #282838; border: none; color: #888; font-size: 14px; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .note-close-btn:hover { background: #6c5ce7; color: white; }
  .note-history { margin-bottom: 8px; max-height: 100px; overflow-y: auto; padding: 4px 0; }
  .nh-item { font-size: 12px; color: #666; padding: 4px 0; border-bottom: 1px solid #1a1a2e; display: flex; gap: 8px; align-items: flex-start; }
  .nh-date { color: #888; white-space: nowrap; font-weight: 600; min-width: 40px; }
  .nh-person { color: #a78bfa; font-size: 11px; }
  .nh-text { color: #777; word-break: break-word; }
  .nh-empty { font-size: 11px; color: #444; font-style: italic; }
  .add-wrap { display: flex; gap: 8px; margin-bottom: 28px; }
  .add-wrap input { flex: 1; background: rgba(255,255,255,0.10); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.30); border-radius: 10px; padding: 10px 14px; color: #e8e8ed; font-size: 14px; outline: none; }
  .add-wrap input:focus { border-color: #6c5ce7; }
  .add-wrap .add-btn { background: #6c5ce7; border: none; color: white; font-size: 18px; width: 40px; border-radius: 10px; cursor: pointer; font-weight: 600; }

  .heatmap-section { background: rgba(255,255,255,0.10); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.30); border-radius: 14px; padding: 16px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.25); }
  .heatmap-section h3 { font-size: 13px; color: #888; margin-bottom: 12px; }
  .heatmap { display: flex; flex-wrap: wrap; gap: 3px; }
  .heatmap .day { width: 12px; height: 12px; border-radius: 2px; background: #0f0f13; }
  .heatmap .day.l0 { background: #0f0f13; }
  .heatmap .day.l1 { background: #1a1a3a; }
  .heatmap .day.l2 { background: #2d2d6e; }
  .heatmap .day.l3 { background: #5b5be0; }
  .heatmap .day.l4 { background: #818cf8; }
  .heatmap .day.l5 { background: #34d399; }
  .heatmap .day.today { outline: 2px solid #a855f7; outline-offset: 1px; }
  .heatmap-legend { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 8px; font-size: 10px; color: #555; }
  .heatmap-legend .swatch { width: 10px; height: 10px; border-radius: 2px; }
  .care-input { width:100%;background:#0f0f13;border:1px solid #282838;border-radius:6px;padding:6px 8px;color:#e8e8ed;font-size:13px;outline:none;text-align:center; }
  .care-input:focus { border-color:#6c5ce7; }

  .footer-actions { display: flex; justify-content: center; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
  .footer-btn { background: none; border: none; color: #555; font-size: 12px; cursor: pointer; padding: 8px 12px; border-radius: 8px; }
  .name-select { background: #0f0f13; border: 1px solid #444; border-radius: 6px; color: #e8e8ed; font-size: 12px; padding: 4px 6px; flex-shrink: 0; max-width: 90px; cursor: pointer; }
  .name-select:focus { border-color: #6c5ce7; }
  .item-selected { color: #a78bfa; font-size: 12px; font-weight: 600; flex-shrink: 0; min-width: 36px; }
  .item-text.name-picker { flex: none; min-width: 70px; }
  @keyframes editSlideIn { 0% { opacity: 0; transform: translateX(-40px); } 100% { opacity: 1; transform: translateX(0); } }
  .check-item .edit-btn, .check-item .del-btn { display: none; }
  .edit-mode .edit-btn, .edit-mode .del-btn { display: inline-block !important; }
  .edit-mode .edit-btn { opacity: 0.6 !important; }
  .edit-mode .del-btn { opacity: 0.8 !important; }
  /* In edit mode, blur right-side buttons (lock, note) */
  .edit-mode .lock-btn, .edit-mode .note-btn { opacity: 0.15; pointer-events: none; filter: blur(2px); }
  .edit-mode .cb { pointer-events: none; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #282838; border-top-color: #6c5ce7; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .care-toggle { width:100%;background:rgba(255,255,255,0.10);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.30);border-radius:10px;padding:10px 14px;margin-top:4px;margin-bottom:16px;color:#a78bfa;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s; }
  .care-toggle:hover { border-color:#a78bfa; }
  .care-toggle .care-arrow { font-size:11px;transition:transform .3s; }
  .care-toggle.open .care-arrow { transform:rotate(180deg); }
  .care-overview { display:none;background:rgba(255,255,255,0.10); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.30); border-radius:12px;padding:14px;margin-bottom:16px; }
  .care-overview.open { display:block; }
  .care-overview table { width:100%;border-collapse:collapse;font-size:12px; }
  .care-overview th { text-align:left;color:#666;font-weight:600;font-size:11px;padding:6px 4px;border-bottom:1px solid #282838; }
  .care-overview td { padding:6px 4px;border-bottom:1px solid #1a1a2e;color:#ccc; }
  .care-overview tr:last-child td { border-bottom:none; }
  .care-overview .ov-head { font-weight:600;color:#e8e8ed; }
  .care-overview .ov-status { display:inline-block;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:600; }
  .care-overview .ov-status.ready { background:#065f4622;color:#34d399; }
  .care-overview .ov-status.cooling { background:#78350f22;color:#f59e0b; }
  .care-overview .ov-status.never { background:#1e3a5f22;color:#60a5fa; }
  /* Cute name dialog styles */
  .cute-dialog { background: linear-gradient(145deg, #1e1e32, #2a1a3e); border: 1px solid rgba(168,85,247,.2); border-radius: 20px; padding: 28px 24px; width:90%; max-width:400px; max-height:80vh; overflow-y:auto; box-shadow: 0 8px 32px rgba(0,0,0,.5); position:relative; }
  .cute-dialog::before { content:'🌸'; position:absolute; top:-6px; right:-6px; font-size:20px; opacity:.6; }
  .cute-dialog::after { content:'🌿'; position:absolute; bottom:-6px; left:-6px; font-size:16px; opacity:.5; }
  .cute-dialog h3 { font-size:18px; font-weight:700; margin-bottom:16px; color:#e8e8ed; text-align:center; }
  .cute-dialog .name-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:12px; margin-bottom:4px; transition:background .2s; }
  .cute-dialog .name-item:hover { background: rgba(168,85,247,.08); }
  .cute-dialog .name-index { width:22px; height:22px; border-radius:50%; background:rgba(168,85,247,.15); color:#a78bfa; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
  .cute-dialog .name-avatar { width:32px; height:32px; border-radius:50%; background: linear-gradient(135deg, #6c5ce7, #a855f7); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:white; flex-shrink:0; }
  .cute-dialog .name-text { flex:1; font-size:14px; color:#e8e8ed; cursor:text; padding:4px 0; }
  .cute-dialog .del-name-btn { background:none; border:none; color:#f87171; font-size:16px; cursor:pointer; padding:2px 6px; border-radius:6px; opacity:.5; transition:all .2s; }
  .cute-dialog .del-name-btn:hover { opacity:1; background:rgba(248,113,113,.1); }
  .cute-dialog .input-wrap { display:flex; gap:8px; margin-top:12px; }
  .cute-dialog .input-wrap input { flex:1; background:#1a1a28; border:1px solid #333; border-radius:10px; padding:10px 14px; color:#e8e8ed; font-size:14px; outline:none; }
  .cute-dialog .input-wrap input:focus { border-color:#a855f7; }
  .cute-dialog .input-wrap .add-name-btn { background:linear-gradient(135deg,#6c5ce7,#a855f7); border:none; color:white; font-size:18px; width:40px; border-radius:10px; cursor:pointer; font-weight:600; }
  .cute-dialog .btn-row { display:flex; gap:8px; margin-top:16px; }
  .cute-dialog .btn-row .close-btn { flex:1; background:#282838; border:none; border-radius:10px; padding:10px; color:#e8e8ed; font-size:14px; cursor:pointer; transition:background .2s; }
  .cute-dialog .btn-row .close-btn:hover { background:#333; }
  .cute-dialog .btn-row .save-btn { flex:1; background:linear-gradient(135deg,#6c5ce7,#a855f7); border:none; border-radius:10px; padding:10px; color:white; font-size:14px; font-weight:600; cursor:pointer; }
  @media (max-width: 480px) { .app { padding: 16px 12px 32px; } }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div style="margin-bottom:16px;"><img src="icon-192-android.png" alt="Android" style="width:72px;height:72px;border-radius:18px;"></div>
  <h2>每日行動儀表板</h2>
  <p>輸入儀表板名稱</p>
  <input type="text" id="loginKey" placeholder="alan" maxlength="20" autocomplete="off">
  <button class="login-btn" id="loginBtn">進入</button>
  <p class="hint">💡 不同裝置用同一個名稱就會自動同步</p>
</div>

<div class="app" id="mainApp" style="display:none">
  <div class="header">
    <h1><span class="status-dot offline" id="statusDot"></span><img src="icon-192-android.png" alt="" style="width:28px;height:28px;border-radius:7px;vertical-align:middle;margin-right:6px;"> <span id="boardName">儀表板</span></h1>
    <div class="streak-badge" id="streakBadge" style="display:none">
      <span class="fire">🔥</span><span id="streakCount">0</span>天
    </div>
  </div>

  <div class="date-nav">
    <button id="prevDay">‹</button>
    <div><span class="date-label" id="dateLabel"></span><span class="weekday" id="weekdayLabel"></span></div>
    <button id="nextDay">›</button>
    <div class="today-btn" id="todayBtn">今天</div>
  </div>

  <div class="stats">
    <div class="stat-card c1"><div class="num green" id="doneCount">0</div><div class="label">已完成</div></div>
    <div class="stat-card c2"><div class="num blue" id="totalCount">0</div><div class="label">總項目</div></div>
    <div class="stat-card c3"><div class="num amber" id="daysCount">0</div><div class="label">運作天數</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-top"><span>今日進度</span><span class="pct" id="progressPct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="checklist-wrap">
    <div class="edit-bar"><button class="edit-toggle" id="editToggle">✏️編輯項目</button></div>
    <div class="checklist" id="checklist"></div>
  </div>

  <div class="add-wrap">
    <input type="text" id="newItemInput" placeholder="新增項目..." maxlength="60">
    <button class="add-btn" id="addBtn">+</button>
  </div>

  <div id="careToggleWrap" style="display:none;">
    <button class="care-toggle" id="careToggleBtn">
      <span>📊 關心總覽表</span>
      <span class="care-arrow">▼</span>
    </button>
    <div class="care-overview" id="careOverview"></div>
  </div>

  <div class="heatmap-section">
    <h3>📊 近 90 天熱力圖</h3>
    <div class="heatmap" id="heatmap"></div>
    <div class="heatmap-legend"><span>少</span><span class="swatch" style="background:#0f0f13"></span><span class="swatch" style="background:#1a1a3a"></span><span class="swatch" style="background:#2d2d6e"></span><span class="swatch" style="background:#5b5be0"></span><span class="swatch" style="background:#818cf8"></span><span class="swatch" style="background:#34d399"></span><span>多</span></div>
  </div>

  <div class="footer-actions">
    <button class="footer-btn" id="resetBtn">🗑️ 重置今天</button>
    <button class="footer-btn" id="nameListBtn">👥 名單管理</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, getDocFromServer } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRazQsleeT4H4Nt6VrqI1KGlfVenc",
  authDomain: "bentodish-alan.firebaseapp.com",

  appId: "1:652937239500:web:2c4c3b28b2311f2b12db69"
};

const DEFAULT_NAMES = ["陳冠宇","姜艾陵","曾文欽","陳淑鳳","呂桓毅","陳有德","范育誠","鄭子韋","康必達","邵玥秞","呂秀娟","林于修","王信淵","蘇素茹","李國珍","王嬿翔","洪國城","劉子榕","胡哲強","四海的曾姐","陳敏祥","張玉玲","馬靜","李冠璇","阿殷","龔裕琇","徐紹真","徐紹堂","施小呅","葉人渝"];

const DEFAULTS = [
  {text:"早起後不碰手機，先喝水",type:"text",locked:true},
  {text:"每天讀 10 頁紙本書",type:"text",locked:true},
  {text:"寫三句話日記",type:"text",locked:true},
  {text:"整理一個空間（10分鐘）",type:"text",locked:true},
  {text:"做 10 分鐘運動",type:"text",locked:true},
  {text:"學一個小技能",type:"text",locked:true},
  {text:"和一個人深度聊天",type:"text",locked:true},
  {text:"三省吾身",type:"text",locked:true},
  {text:"睡前寫下明天要做的事",type:"text",locked:true},
  {text:"今天成全了誰？",type:"name-picker",selected:"",locked:true}
];

let boardKey = localStorage.getItem('dashboard_key') || '';
let cache = {};
let currentDate = new Date();
let saveTimer = null;
let nameList = [...DEFAULT_NAMES];
let editMode = false;
let careDates = {};
let careEvery = 1;
let careCount = 1;
let careInterval = 7;
let startDate = '';
const EPOCH = new Date('2025-01-01');

function dk(d) { return d.toISOString().slice(0,10); }
function today() { return dk(new Date()); }

function makeDay(items) {
  return {
    items: items.map(i => typeof i === 'string' ? {text:i,type:"text",done:false,selected:"",notes:"",locked:true}
      : {...i, done: i.done || false, selected: i.selected || "", notes: i.notes || "", locked: i.locked !== false}),
    _names: nameList
  };
}

async function loadDoc() {
  try {
    const ref = doc(db, "dashboard", boardKey);
    const snap = await getDocFromServer(ref);
    return snap.exists() ? snap.data() : {};
  } catch(e) {
    console.warn('Load failed:', e);
    setStatus(false);
    return {};
  }
}

async function saveDoc(extra) {
  try {
    const ref = doc(db, "dashboard", boardKey);
    const data = await loadDoc();
    const names = nameList.length ? nameList : DEFAULT_NAMES;
    data._names = names;
    data._careEvery = careEvery;
    data._careCount = careCount;
    data._careInterval = careInterval;
    data._careDates = careDates;
    // Set _startDate on first save if not exists
    if (!data._startDate) data._startDate = today();
    if (extra) Object.assign(data, extra);
    await setDoc(ref, data);
    setStatus(true);
  } catch(e) {
    console.warn('Save failed:', e);
    setStatus(false);
  }
}

async function loadDay(key, dateStr) {
  const data = await loadDoc();
  nameList = data._names && data._names.length ? data._names : DEFAULT_NAMES;
  careEvery = data._careEvery || 1;
  careCount = data._careCount || 1;
  careInterval = data._careInterval || 7;
  careDates = data._careDates || {};
  startDate = data._startDate || '';
  const dayData = data[dateStr];
  if (dayData && dayData.items) {
    let migrated = dayData.items.map(i => typeof i === 'string'
      ? {text:i,type:"text",done:false,selected:"",notes:"",locked:true}
      : {...i, done:i.done||false, selected:i.selected||"", notes:i.notes||"", locked:i.locked!==false});
    // Update text/type from defaults without appending deleted items
    DEFAULTS.forEach((def, j) => {
      if (j >= migrated.length) return;
      if (def.type === 'name-picker' && migrated[j].type !== 'name-picker') {
        migrated[j].type = 'name-picker';
        migrated[j].selected = migrated[j].selected || '';
        migrated[j].text = def.text; // Update text when converting to name-picker
      }
      // Reverse: if DEFAULTS says text but stored is name-picker (item moved), downgrade
      if (def.type === 'text' && migrated[j].type === 'name-picker') {
        migrated[j].type = 'text';
        delete migrated[j].selected;
        migrated[j].text = def.text; // Update text when converting to text
      }
      // Sync name-picker text with defaults (label always matches)
      if (def.type === 'name-picker' && migrated[j].type === 'name-picker' && migrated[j].text !== def.text) {
        migrated[j].text = def.text;
      }
      // Set default text only if empty (user can customize)
      if (!migrated[j].text && migrated[j].type === def.type) migrated[j].text = def.text;
    });
    cache[dateStr] = { items: migrated };
  // DEBUG: name-picker selected after loadDay
  const npItem = migrated.find(i => i.type === 'name-picker');
  if (npItem) console.log('loadDay name-picker selected=' + JSON.stringify(npItem.selected));
  } else {
    cache[dateStr] = { items: DEFAULTS.map(i => ({...i, done:false, selected:i.selected||"", notes:""})) };
  }
  // Force sync: directly set name-picker selected from raw Firestore data
  const allKeys = Object.keys(data).filter(k => k !== '_names' && k !== '_careEvery' && k !== '_careCount' && k !== '_careInterval' && k !== '_careDates' && k !== '_startDate');
  const dataKeysInfo = 'dateKeys=' + allKeys.length + ' [' + allKeys.slice(0,10).join(', ') + ']';
  const diagDayData = dayData ? JSON.stringify(dayData).substring(0,200) : 'undefined';
  alert('dayData type=' + typeof dayData + ' | ' + dataKeysInfo + ' | raw=' + diagDayData);
  if (dayData && dayData.items && Array.isArray(dayData.items)) {
    const storedRaw = dayData.items[9]; // name-picker is always last item
    const cacheItems = cache[dateStr] && cache[dateStr].items;
    if (cacheItems && cacheItems.length > 9) {
      // DIAGNOSTIC: show ALL keys and values of storedRaw
      const keys = Object.keys(storedRaw);
      const vals = keys.map(k => k + '=' + JSON.stringify(storedRaw[k])).join(', ');
      alert('storedRaw[9] keys: ' + keys.length + ' values: ' + vals);
      // Walk ALL keys of the stored item to find the selected value
      for (const key of Object.keys(storedRaw)) {
        if (key.toLowerCase().includes('select') && storedRaw[key]) {
          cacheItems[9].selected = storedRaw[key];
          break;
        }
      }
      // If still empty, try JSON.stringify to find hidden fields
      if (!cacheItems[9].selected) {
        const str = JSON.stringify(storedRaw);
        const m = str.match(/王嬿翔|陳冠宇|select[^}]{0,20}/);
        if (m) console.log('Found in JSON:', m[0]);
      }
    }
  }
  // Auto-fill today's name-picker if empty
  ensureTodayNamePickerSelected(dateStr);
  render();
}

async function saveCurrentDay() {
  const day = cache[dk(currentDate)];
  if (!day) return;
  const data = await loadDoc();
  data[dk(currentDate)] = { items: day.items.map(i => ({text:i.text,type:i.type,done:i.done,selected:i.selected||"",notes:i.notes||"",locked:i.locked!==false})) };
  data._names = nameList.length ? nameList : DEFAULT_NAMES;
  data._careEvery = careEvery;
  data._careCount = careCount;
  data._careInterval = careInterval;
  data._careDates = careDates;
  if (!data._startDate) data._startDate = today();
  try {
    await setDoc(doc(db, "dashboard", boardKey), data);
    setStatus(true);
  } catch(e) { setStatus(false); }
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentDay, 500);
}

async function preloadRecent(key) {
  const data = await loadDoc();
  nameList = data._names && data._names.length ? data._names : DEFAULT_NAMES;
  careEvery = data._careEvery || 1;
  careCount = data._careCount || 1;
  careInterval = data._careInterval || 7;
  careDates = data._careDates || {};
  for (const [ds, dayData] of Object.entries(data)) {
    if (ds === '_names' || ds === '_careEvery' || ds === '_careCount' || ds === '_careInterval' || ds === '_careDates') continue;
    // Skip today — already loaded and migrated by loadDay
    if (ds === dk(currentDate)) continue;
    if (dayData && dayData.items) {
      cache[ds] = { items: dayData.items.map(i => typeof i === 'string'
        ? {text:i,type:"text",done:false,selected:"",notes:"",locked:true}
        : {...i, done:i.done||false, selected:i.selected||"", notes:i.notes||"", locked:i.locked!==false}) };
    }
  }
  const today2 = new Date();
  for (let i = 0; i < 90; i++) {
    const d = new Date(today2); d.setDate(d.getDate() - i);
    const ds = dk(d);
    if (!cache[ds]) cache[ds] = { items: DEFAULTS.map(i => ({...i, done:false, selected:i.selected||"", notes:""})) };
  }
  ensureTodayNamePickerSelected(dk(new Date()));
  renderHeatmap();
  renderStreak();
}

function setStatus(online) {
  document.getElementById('statusDot').className = 'status-dot ' + (online ? 'online' : 'offline');
}

function render() {
  const key = dk(currentDate);
  const day = cache[key];
  if (!day) return;
  const items = day.items;
  const total = items.length, completed = items.filter(i => i.done).length;
  const rate = total ? Math.round(completed/total*100) : 0;
  document.getElementById('dateLabel').textContent = `${currentDate.getFullYear()}/${currentDate.getMonth()+1}/${currentDate.getDate()}`;
  document.getElementById('weekdayLabel').textContent = `週${['日','一','二','三','四','五','六'][currentDate.getDay()]}`;
  document.getElementById('todayBtn').style.display = dk(currentDate) === today() ? 'none' : '';
  document.getElementById('doneCount').textContent = completed;
  document.getElementById('totalCount').textContent = total;
  // Calculate days running from _startDate
  if (typeof startDate !== 'undefined' && startDate) {
    const s = new Date(startDate);
    const now = new Date();
    const days = Math.floor((now - s) / (86400000)) + 1;
    document.getElementById('daysCount').textContent = days;
  } else {
    document.getElementById('daysCount').textContent = '—';
  }
  document.getElementById('progressPct').textContent = rate + '%';
  document.getElementById('progressFill').style.width = rate + '%';
  const list = document.getElementById('checklist');
  list.className = 'checklist' + (editMode ? ' edit-mode' : '');
  list.innerHTML = '';
  items.forEach((item, i) => {
    const text = item.text, done = item.done, notes = item.notes || '';
    const locked = item.locked !== false;
    const div = document.createElement('div');
    div.className = 'check-item' + (done ? ' done' : '') + (notes ? ' has-note' : '');
    let extraHTML = '';
    if (item.type === 'name-picker') {
      const names = item.selected ? item.selected.split(',').filter(Boolean) : [];
      if (careCount > 1 || names.length > 1) {
        extraHTML = `<span class="item-text">👤 ${esc(text)}</span>` +
          `<div style="display:flex;flex-wrap:wrap;gap:4px;flex:1;align-items:center;">` +
          names.map(s => `<span style="background:linear-gradient(135deg,#6c5ce7,#a855f7);color:white;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;">${esc(s)}</span>`).join('') +
          (names.length ? '' : `<span style="color:#555;font-size:12px;">未選</span>`) +
          `</div>`;
      } else {
        const todayName = names[0] || '?';
        extraHTML = `<span class="item-text">👤 ${esc(text)} <strong>${esc(todayName)}</strong></span>`;
      }
      var nhExtra = '<div class="note-history" id="noteHistory' + i + '"></div>';
    } else {
      extraHTML = `<span class="item-text">${esc(text)}</span>`;
      var nhExtra = '';
    }
    div.innerHTML = `<span class="item-num">${i+1}</span><div class="cb">✓</div><button class="edit-btn" data-idx="${i}">✏️</button>${extraHTML}<button class="del-btn" data-idx="${i}">✕</button>` +
      `<button class="lock-btn" data-idx="${i}">${locked?'🔒':'🔓'}</button>` +
      `${i > 0 ? `<button class="note-btn" data-idx="${i}">📝</button>` : ''}` +
      `<div class="note-area" id="noteArea${i}">${nhExtra}<textarea data-idx="${i}" placeholder="寫備註...">${esc(notes)}</textarea><button class="note-close-btn" data-idx="${i}">▲</button></div>`;
    div.querySelector('.cb').onclick = (e) => { if (editMode) return; toggle(i); };
    if (item.type !== 'name-picker') {
      div.querySelector('.item-text').onclick = (e) => { if (editMode) return; toggle(i); };
    }
    const selEl = div.querySelector('.name-select');
    if (selEl) selEl.onchange = function() {
      item.selected = this.value;
      updateCareDates(this.value);
      const s = div.querySelector('.item-selected');
      if (s) s.textContent = this.value || '未選';
      scheduleSave();
    };
    const noteBtnEl = div.querySelector('.note-btn');
    if (noteBtnEl) noteBtnEl.onclick = (e) => {
      e.stopPropagation();
      const a=document.getElementById('noteArea'+i); a.classList.toggle('open');
      const hDiv = document.getElementById('noteHistory' + i);
      if (hDiv) {
        const h = getHistoryNotes(i);
        hDiv.innerHTML = !h.length ? '<div class="nh-empty">前兩天無記錄</div>'
          : h.map(x => '<div class="nh-item"><span class="nh-date">' + esc(x.date) + '</span>'
            + (x.selected ? '<span class="nh-person">👤' + esc(x.selected) + '</span>' : '')
            + '<span class="nh-text">' + esc(x.notes) + '</span></div>').join('');
      }
      a.querySelector('textarea').focus();
    };
    div.querySelector('.lock-btn').onclick = e => { e.stopPropagation(); toggleLock(i); };
    div.querySelector('.edit-btn').onclick = e => {
      e.stopPropagation();
      const d=cache[dk(currentDate)]; if(!d||!d.items[i]) return;
      const item=d.items[i];
      if (item.locked && !editMode) return;
      const textSpan = div.querySelector('.item-text');
      if (!textSpan || textSpan.tagName==='INPUT') return;
      const isNp = item.type === 'name-picker';
      const inp = document.createElement('input');
      inp.type='text'; inp.className='item-text-input'; inp.value=isNp ? item.text : item.text;
      inp.maxLength=60;
      textSpan.replaceWith(inp);
      inp.focus(); inp.select();
      const save = () => {
        const v = inp.value.trim();
        if (v && v !== item.text) { item.text = v; scheduleSave(); }
        const span = document.createElement('span');
        span.className = 'item-text' + (isNp ? ' name-picker' : '');
        span.textContent = isNp ? '👤 ' + (v||item.text) : (v||item.text);
        inp.replaceWith(span);
        if (!isNp) span.onclick = () => toggle(i);
      };
      inp.onblur = save;
      inp.onkeydown = e2 => { if (e2.key==='Enter') { e2.preventDefault(); inp.blur(); } };
    };
    div.querySelector('.del-btn').onclick = e => { e.stopPropagation(); const it=cache[dk(currentDate)]?.items?.[i]; if (it && it.locked!==false && !editMode) return; if (confirm(`刪除「${text}」？`)) del(i); };
    list.appendChild(div);
  });
  document.querySelectorAll('.note-area textarea').forEach(ta => {
    ta.oninput = () => { const idx=parseInt(ta.dataset.idx); const d=cache[dk(currentDate)]; if (d && d.items[idx]) d.items[idx].notes=ta.value; scheduleSave(); };
  });
  document.querySelectorAll('.note-close-btn').forEach(btn => {
    btn.onclick = () => { document.getElementById('noteArea'+btn.dataset.idx).classList.remove('open'); };
  });
  // === Care Overview toggle (below last name-picker item) ===
  const toggleWrap = document.getElementById('careToggleWrap');
  if (toggleWrap) {
    const lastNpIdx = [...items].reverse().findIndex(it => it.type === 'name-picker');
    if (lastNpIdx !== -1) {
      const isOpen = localStorage.getItem('careOverviewOpen') === 'true';
      toggleWrap.style.display = '';
      document.getElementById('careToggleBtn').className = 'care-toggle' + (isOpen ? ' open' : '');
      document.getElementById('careOverview').className = 'care-overview' + (isOpen ? ' open' : '');
      if (isOpen) renderCareOverview();
    } else {
      toggleWrap.style.display = 'none';
    }
  }
  // Restore open notes and editing text after rebuild
  if (typeof _openNotes !== 'undefined') {
    for (const idx of Object.keys(_openNotes)) {
      const a = document.getElementById('noteArea' + idx);
      if (a) a.classList.add('open');
    }
  }
  if (typeof _editingText !== 'undefined') {
    for (const [idx, val] of Object.entries(_editingText)) {
      const inp = document.querySelector('.item-text-input[data-idx="' + idx + '"]');
      if (inp) inp.value = val;
    }
  }
}

// === Realtime Sync ===
let syncUnsub = null;
function startRealtimeSync() {
  if (syncUnsub) syncUnsub();
  const ref = doc(db, "dashboard", boardKey);
  let ready = false;
  let lastRenderKey = '';
  setTimeout(() => { ready = true; }, 1000);
  syncUnsub = onSnapshot(ref, { includeMetadataChanges: true }, snap => {
    if (!snap.exists || !ready) return;
    if (snap.metadata.hasPendingWrites) return;
    const data = snap.data();
    if (!data) return;
    nameList = data._names && data._names.length ? data._names : DEFAULT_NAMES;
    careEvery = data._careEvery || 1; careCount = data._careCount || 1;
    careInterval = data._careInterval || 7; careDates = data._careDates || {};
    const todayKey = dk(currentDate);
    const remoteToday = data[todayKey];
    // Don't rebuild while user is editing notes or text
    const hasOpenNote = document.querySelector('.note-area.open') !== null;
    const hasEditing = document.querySelector('.item-text-input') !== null;
    if (hasOpenNote || hasEditing) return;
    const needRender = remoteToday && remoteToday.items
      ? JSON.stringify(remoteToday.items) !== JSON.stringify(cache[todayKey]?.items)
      : !cache[todayKey];
    if (needRender) {
      // Save open note states before rebuilding
      window._openNotes = {};
      document.querySelectorAll('.note-area.open').forEach(el => {
        const idx = el.dataset.idx;
        if (idx !== undefined) window._openNotes[idx] = true;
      });
      window._editingText = {};
      document.querySelectorAll('.item-text-input').forEach(el => {
        const idx = el.dataset.idx;
        if (idx !== undefined) window._editingText[idx] = el.value;
      });

      cache = {};
      for (const [ds, dd] of Object.entries(data)) {
        if (ds.startsWith('_')) continue;
        if (dd && dd.items) cache[ds] = { items: dd.items.map(i => typeof i === 'string'
          ? {text:i,type:"text",done:false,selected:"",notes:"",locked:true}
          : {...i, done:i.done||false, selected:i.selected||"", notes:i.notes||"", locked:i.locked!==false}) };
      }
      if (!cache[todayKey]) {
        for (let i = 0; i < 90; i++) {
          const d3 = new Date(); d3.setDate(d3.getDate()-i);
          const ds = dk(d3);
          if (!cache[ds]) cache[ds] = { items: DEFAULTS.map(x => ({...x, done:false, selected:x.selected||"", notes:""})) };
        }
        if (!cache[todayKey]) cache[todayKey] = { items: DEFAULTS.map(x => ({...x, done:false, selected:x.selected||"", notes:""})) };
      }
      ensureTodayNamePickerSelected(todayKey);
      render();
    }
    renderHeatmap();
    renderStreak();
  });
}

function updateCareDates(selected) {
  if (!selected) return;
  const names = selected.split(',').filter(Boolean);
  const todayStr = today();
  names.forEach(n => { careDates[n] = todayStr; });
}

function ensureTodayNamePickerSelected(dateStr) {
  const day = cache[dateStr];
  if (!day || !day.items) return;
  const np = day.items.find(i => i.type === 'name-picker');
  if (!np) return;
  const suggestions = getCareSuggestions();
  if (suggestions.length) {
    np.selected = suggestions.join(',');
    updateCareDates(np.selected);
    scheduleSave();
  }
}

function getDateDiffDays() {
  const ref = new Date(EPOCH);
  const now = new Date();
  return Math.round((now - ref) / 86400000);
}
function getCareSuggestions() {
  if (!nameList.length) return [];
  // Daily rotation: pick one person per day based on date offset from EPOCH
  const diff = getDateDiffDays();
  const idx = diff % nameList.length;
  return [nameList[idx]];
}
function getTodayPerson() {
  const suggestions = getCareSuggestions();
  if (suggestions.length) return suggestions[0];
  // Fallback: traditional rotation
  if (!nameList.length) return '';
  const start = new Date('2024-01-01');
  const diff = Math.floor((Date.now() - start.getTime()) / 86400000);
  return nameList[diff % nameList.length];
}

function renderCareOverview() {
  const ov = document.getElementById('careOverview');
  if (!ov) return;
  const now = new Date();
  const rows = nameList.map(n => {
    const last = careDates[n];
    const days = last ? Math.round((now - new Date(last)) / 86400000) : -1;
    const eligible = days === -1 || days >= careInterval;
    let status, cls;
    if (days === -1) { status = '未曾關心'; cls = 'never'; }
    else if (eligible) { status = `可關心（${days}天前）`; cls = 'ready'; }
    else { status = `冷卻中（${days}/${careInterval}）`; cls = 'cooling'; }
    return { n, last, days, status, cls };
  });
  const sorted = [...rows].sort((a, b) => {
    if (a.days === -1 && b.days === -1) return nameList.indexOf(a.n) - nameList.indexOf(b.n);
    if (a.days === -1) return -1;
    if (b.days === -1) return 1;
    return a.days - b.days;
  });
  const totalCared = rows.filter(r => r.days >= 0).length;
  const avgDays = totalCared ? Math.round(rows.reduce((s, r) => s + (r.days >= 0 ? r.days : 0), 0) / totalCared) : 0;
  ov.innerHTML = `<div style="display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:8px;">
    <span>👥 ${nameList.length} 人</span>
    <span>📅 週期：每 ${careEvery} 天關心 ${careCount} 人</span>
    <span>⏱ 平均 ${avgDays} 天前</span>
  </div>
  <table>
    <tr><th>姓名</th><th>上次關心</th><th>間隔</th><th>狀態</th></tr>
    ${sorted.map(r => `<tr>
      <td class="ov-head">${esc(r.n)}</td>
      <td>${r.last || '—'}</td>
      <td>${r.days === -1 ? '—' : r.days + ' 天'}</td>
      <td><span class="ov-status ${r.cls}">${esc(r.status)}</span></td>
    </tr>`).join('')}
  </table>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toggle(i) { const d=cache[dk(currentDate)]; if (!d||!d.items[i]) return; d.items[i].done=!d.items[i].done; render(); scheduleSave(); }
function del(i) { const d=cache[dk(currentDate)]; if(!d||!d.items[i]) return; if(d.items[i].locked!==false && !editMode) return; d.items.splice(i,1); render(); scheduleSave(); }
function toggleLock(i) { const d=cache[dk(currentDate)]; if(!d||!d.items[i]) return; d.items[i].locked=!d.items[i].locked; render(); scheduleSave(); }
function addItem(t) { t=t.trim(); if(!t) return; const d=cache[dk(currentDate)]; if(!d) return; d.items.push({text:t,type:"text",done:false,selected:"",notes:"",locked:false}); render(); scheduleSave(); }

function getHistoryNotes(idx) {
  const today = currentDate;
  const out = [];
  for (let o = 1; o <= 2; o++) {
    const d = new Date(today); d.setDate(d.getDate() - o);
    const ds = dk(d);
    const day = cache[ds];
    if (day && day.items && day.items[idx] && day.items[idx].notes) {
      out.push({ date: `${d.getMonth()+1}/${d.getDate()}`, selected: day.items[idx].selected||'', notes: day.items[idx].notes });
    }
  }
  return out;
}

function renderStreak() {
  let s=0; const d2=new Date();
  while(true) {
    const ds=dk(d2); const day=cache[ds]; if(!day) break;
    if(day.items.length&&day.items.every(i=>i.done)) {s++; d2.setDate(d2.getDate()-1);} else break;
  }
  const badge=document.getElementById('streakBadge');
  if(s>0){badge.style.display='inline-flex'; document.getElementById('streakCount').textContent=s;}
  else badge.style.display='none';
}

function renderHeatmap() {
  const container=document.getElementById('heatmap'); container.innerHTML='';
  const today2=new Date();
  for(let i=89;i>=0;i--) {
    const d=new Date(today2); d.setDate(d.getDate()-i); const ds=dk(d);
    const day=cache[ds]; let level=0;
    if(day&&day.items.length) {const r=day.items.filter(x=>x.done).length/day.items.length; if(r===1) level=5; else if(r>=.8) level=4; else if(r>=.6) level=3; else if(r>=.3) level=2; else if(r>0) level=1;}
    const div=document.createElement('div');
    div.className=`day l${level}`+(ds===today()?' today':'');
    div.title=`${d.getMonth()+1}/${d.getDate()}: ${day?day.items.filter(x=>x.done).length+'/'+day.items.length:'0/0'}`;
    container.appendChild(div);
  }
}

// === Name Management Dialog ===
const dialogHTML = `
<div id="nameDialog" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div class="cute-dialog">
    <h3>🌸 管理人員名單 🌸</h3>
    <div id="nameListContainer"></div>
    <div class="input-wrap">
      <input type="text" id="newNameInput" placeholder="新增姓名..." maxlength="20">
      <button id="addNameBtn" class="add-name-btn">+</button>
    </div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid #382838;">
      <div style="font-size:13px;color:#a78bfa;margin-bottom:10px;font-weight:600;">📅 關心頻率設定</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <div style="text-align:center;"><label style="font-size:11px;color:#666;">每 N 天關心</label><input type="number" id="careEveryInput" min="1" max="365" value="1" class="care-input"></div>
        <div style="text-align:center;"><label style="font-size:11px;color:#666;">每次 N 人</label><input type="number" id="careCountInput" min="1" max="20" value="1" class="care-input"></div>
        <div style="text-align:center;"><label style="font-size:11px;color:#666;">間隔 N 天</label><input type="number" id="careIntervalInput" min="0" max="365" value="7" class="care-input"></div>
      </div>
    </div>
    <div class="btn-row">
      <button id="closeNameDialog" class="close-btn">關閉</button>
      <button id="saveNameList" class="save-btn">💾 儲存設定</button>
    </div>
  </div>
</div>`;

function showNameDialog() {
  const existing = document.getElementById('nameDialog');
  if (existing) { existing.style.display = 'flex'; renderNameList(); populateCareInputs(); return; }
  document.body.insertAdjacentHTML('beforeend', dialogHTML);
  const dialog = document.getElementById('nameDialog');
  dialog.style.display = 'flex';
  document.getElementById('closeNameDialog').onclick = () => { dialog.style.display = 'none'; };
  document.getElementById('addNameBtn').onclick = () => {
    const inp = document.getElementById('newNameInput');
    const n = inp.value.trim(); if (!n) return;
    nameList.push(n); inp.value = ''; renderNameList();
  };
  document.getElementById('newNameInput').onkeydown = e => {
    if (e.key === 'Enter') document.getElementById('addNameBtn').click();
  };
  document.getElementById('saveNameList').onclick = async () => {
    careEvery = parseInt(document.getElementById('careEveryInput').value) || 1;
    careCount = parseInt(document.getElementById('careCountInput').value) || 1;
    careInterval = parseInt(document.getElementById('careIntervalInput').value) || 7;
    const ref = doc(db, "dashboard", boardKey);
    const data = await loadDoc();
    data._names = nameList.length ? nameList : DEFAULT_NAMES;
    data._careEvery = careEvery;
    data._careCount = careCount;
    data._careInterval = careInterval;
    data._careDates = careDates;
    try { await setDoc(ref, data); setStatus(true); } catch(e) { setStatus(false); }
    dialog.style.display = 'none';
  };
  populateCareInputs();
  renderNameList();
}
function populateCareInputs() {
  const e = document.getElementById('careEveryInput');
  if (e) e.value = careEvery;
  const c = document.getElementById('careCountInput');
  if (c) c.value = careCount;
  const i = document.getElementById('careIntervalInput');
  if (i) i.value = careInterval;
}

function renderNameList() {
  const container = document.getElementById('nameListContainer');
  if (!container) return;
  container.innerHTML = nameList.map((n, i) => {
    const initial = n.charAt(0);
    return `<div class="name-item">
      <span class="name-index">${i + 1}</span>
      <div class="name-avatar">${esc(initial)}</div>
      <span class="name-text" data-idx="${i}">${esc(n)}</span>
      <button class="del-name-btn" data-idx="${i}">✕</button>
    </div>`;
  }).join('');
  container.querySelectorAll('.name-text').forEach(span => {
    span.onclick = () => {
      const idx = parseInt(span.dataset.idx);
      const inp = document.createElement('input');
      inp.type = 'text'; inp.value = nameList[idx];
      inp.style.cssText = 'flex:1;font-size:14px;background:#0f0f13;border:1px solid #6c5ce7;border-radius:4px;padding:4px 8px;color:#e8e8ed;outline:none;font-family:inherit;';
      inp.maxLength = 20;
      span.replaceWith(inp);
      inp.focus(); inp.select();
      const save = () => {
        const v = inp.value.trim();
        if (v && v !== nameList[idx]) nameList[idx] = v;
        renderNameList();
      };
      inp.onblur = save;
      inp.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); inp.blur(); } };
    };
  });
  container.querySelectorAll('.del-name-btn').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.idx);
      nameList.splice(idx, 1);
      renderNameList();
    };
  });
}

// === Events ===
document.getElementById('loginBtn').onclick = () => doLogin();
document.getElementById('loginKey').onkeydown = e => { if (e.key==='Enter') doLogin(); };
async function doLogin() {
  const key = document.getElementById('loginKey').value.trim().toLowerCase();
  if (!key) return;
  boardKey = key;
  localStorage.setItem('dashboard_key', boardKey);
  document.getElementById('boardName').textContent = key + ' 的儀表板';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  await loadDay(boardKey, dk(currentDate));
  preloadRecent(boardKey);
  startRealtimeSync();
}

document.getElementById('prevDay').onclick = () => { currentDate.setDate(currentDate.getDate()-1); const ds=dk(currentDate); if(!cache[ds]){cache[ds]={items:DEFAULTS.map(i=>({...i,done:false,selected:i.selected||"",notes:""}))};} render(); };
document.getElementById('nextDay').onclick = () => { currentDate.setDate(currentDate.getDate()+1); const ds=dk(currentDate); if(!cache[ds]){cache[ds]={items:DEFAULTS.map(i=>({...i,done:false,selected:i.selected||"",notes:""}))};} render(); };
document.getElementById('todayBtn').onclick = () => { currentDate=new Date(); render(); };
document.getElementById('addBtn').onclick = () => { const i=document.getElementById('newItemInput'); addItem(i.value); i.value=''; };
document.getElementById('newItemInput').onkeydown = e => { if (e.key==='Enter') { addItem(e.target.value); e.target.value=''; } };
document.getElementById('nameListBtn').onclick = showNameDialog;
document.getElementById('careToggleBtn').onclick = () => {
  const btn = document.getElementById('careToggleBtn');
  const ov = document.getElementById('careOverview');
  const open = btn.classList.toggle('open');
  ov.classList.toggle('open');
  localStorage.setItem('careOverviewOpen', open);
  if (open) renderCareOverview();
};
document.getElementById('editToggle').onclick = () => {
  editMode = !editMode;
  document.getElementById('editToggle').textContent = editMode ? '✅完成編輯' : '✏️編輯項目';
  document.getElementById('editToggle').className = 'edit-toggle' + (editMode ? ' active' : '');
  render();
};
document.getElementById('resetBtn').onclick = () => {
  if (!confirm('重置今天的資料？')) return;
  const ds=dk(currentDate); cache[ds]={items:DEFAULTS.map(i=>({...i,done:false,selected:i.selected||"",notes:""}))}; render();
  if (boardKey) saveCurrentDay();
};
document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('dashboard_key'); boardKey=''; document.getElementById('mainApp').style.display='none'; document.getElementById('loginScreen').style.display='flex'; document.getElementById('loginKey').value=''; };
document.addEventListener('visibilitychange', () => { if (document.hidden && boardKey) saveCurrentDay(); });

// Auto-login
if (boardKey) {
  document.getElementById('boardName').textContent = boardKey + ' 的儀表板';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  loadDay(boardKey, dk(currentDate));
  preloadRecent(boardKey);
  startRealtimeSync();
}
</script>
